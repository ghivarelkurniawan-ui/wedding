<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f7f3ef;
  text-align: center;
}

/* CONTAINER MOBILE */
.container {
  max-width: 420px;
  margin: auto;
  background: white;
}

/* OPENING ENVELOPE */
.opening {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: linear-gradient(135deg, #8b6f47, #d4af37);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:999;
}

.envelope {
  width: 120px;
  height: 80px;
  background: white;
  position: relative;
  border-radius: 5px;
  cursor: pointer;
}

.envelope:before {
  content:"";
  position:absolute;
  top:-40px;
  left:0;
  width:0;
  height:0;
  border-left:60px solid transparent;
  border-right:60px solid transparent;
  border-bottom:40px solid white;
  transition: 0.5s;
}

.envelope.open:before {
  transform: rotateX(180deg);
}

/* COVER */
.cover {
  height:100vh;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
  url('https://images.unsplash.com/photo-1519741497674-611481863552');
  background-size: cover;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* CARD */
.card {
  background:white;
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn {
  background: linear-gradient(45deg,#d4af37,#8b6f47);
  color:white;
  padding:10px 20px;
  border-radius:25px;
  text-decoration:none;
  display:inline-block;
  margin-top:10px;
}

/* GALLERY */
.gallery img {
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

/* ANIMATION */
.fade {
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}
.fade.show {
  opacity:1;
  transform:translateY(0);
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: gold;
  border-radius: 50%;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" id="opening">
  <h2>Undangan Pernikahan</h2>
  <p id="guest"></p>
  <div class="envelope" onclick="openInvite(this)"></div>
  <p>Klik amplop untuk membuka</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<div class="container">

<section class="cover">
  <h1>Nama Pria & Nama Wanita</h1>
</section>

<section class="fade">
  <div class="card">
    <h2>⏳ Countdown</h2>
    <div id="countdown"></div>
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>💍 Penganten</h2>
    <p>Nama Pria</p>
    <p>Nama Wanita</p>
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>📍 Lokasi</h2>
    <a class="btn" href="https://maps.google.com">Google Maps</a>
  </div>
</section>

<section class="fade">
  <div class="card gallery">
    <h2>📸 Our Memories</h2>
    <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>💌 Ucapan</h2>
    <input id="nama" placeholder="Nama"><br><br>
    <textarea id="pesan" placeholder="Ucapan"></textarea><br>
    <button class="btn" onclick="kirimUcapan()">Kirim</button>
    <div id="list"></div>
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>🎁 Wedding Gift</h2>
    <p>1234567890</p>
  </div>
</section>

</div>

<script>
function openInvite(el){
  el.classList.add("open");
  setTimeout(()=>{
    document.getElementById("opening").style.display="none";
    document.getElementById("music").play();
  },500);
}

function toggleMusic(){
  let m=document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

const urlParams = new URLSearchParams(window.location.search);
const guest = urlParams.get('to');
if(guest){
  document.getElementById("guest").innerText = "Kepada Yth: "+guest;
}

const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', ()=>{
  fades.forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-50){
      el.classList.add('show');
    }
  });
});

const target = new Date("May 10, 2026").getTime();
setInterval(()=>{
  let now=new Date().getTime();
  let d=target-now;
  let h=Math.floor(d/(1000*60*60*24));
  document.getElementById("countdown").innerText = h+" hari lagi";
},1000);

function kirimUcapan(){
  let n=document.getElementById("nama").value;
  let p=document.getElementById("pesan").value;
  document.getElementById("list").innerHTML += "<p><b>"+n+"</b><br>"+p+"</p>";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0f0f0f;
  color:white;
  overflow-x:hidden;
}

/* SECTION FULL SCREEN */
.section {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  position:relative;
}

/* BACKGROUND IMAGE PARALLAX */
.bg {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  transform:scale(1.1);
}

/* OVERLAY */
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  top:0;
}

/* TEXT */
h1 {
  font-family:'Playfair Display', serif;
  font-size:36px;
  letter-spacing:2px;
}

p {
  opacity:0.8;
}

/* ANIMATION */
.fade {
  opacity:0;
  transform:translateY(40px) scale(0.95);
  filter:blur(10px);
  transition:1.2s ease;
}

.fade.show {
  opacity:1;
  transform:translateY(0) scale(1);
  filter:blur(0);
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  border:1px solid #d4af37;
  color:#d4af37;
  border-radius:30px;
  text-decoration:none;
}

/* COUNTDOWN */
.countdown {
  font-size:28px;
  margin-top:10px;
}

/* MUSIC */
.music {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4af37;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="music" onclick="toggleMusic()">🎵</div>

<!-- COVER -->
<section class="section">
  <img class="bg" src="https://images.unsplash.com/photo-1519741497674-611481863552">
  <div class="overlay"></div>

  <div class="fade">
    <p>The Wedding Of</p>
    <h1>Nama Pria & Nama Wanita</h1>
    <p>10 Mei 2026</p>
  </div>
</section>

<!-- AYAT -->
<section class="section">
  <div class="fade">
    <p>
    "Dan di antara tanda-tanda kebesaran-Nya,
    Dia menciptakan pasangan..."
    </p>
  </div>
</section>

<!-- COUNTDOWN -->
<section class="section">
  <div class="fade">
    <h1>Save The Date</h1>
    <div class="countdown" id="countdown"></div>
  </div>
</section>

<!-- LOKASI -->
<section class="section">
  <img class="bg" src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57">
  <div class="overlay"></div>

  <div class="fade">
    <h1>Lokasi</h1>
    <a class="btn" href="https://maps.google.com">Buka Maps</a>
  </div>
</section>

<!-- PENUTUP -->
<section class="section">
  <div class="fade">
    <h1>Terima Kasih</h1>
    <p>Merupakan kehormatan bagi kami atas kehadiran Anda</p>
  </div>
</section>

<script>
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', ()=>{
  fades.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});

/* MUSIC */
function toggleMusic(){
  let m=document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* COUNTDOWN */
const target = new Date("May 10, 2026").getTime();
setInterval(()=>{
  let now=new Date().getTime();
  let d=target-now;

  let hari=Math.floor(d/(1000*60*60*24));
  let jam=Math.floor((d%(1000*60*60*24))/(1000*60*60));

  document.getElementById("countdown").innerText =
  hari+" Hari "+jam+" Jam";
},1000);
</script>

</body>
</html>

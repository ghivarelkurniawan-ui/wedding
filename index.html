<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdfaf6;
  color: #333;
  text-align: center;
}

section {
  padding: 60px 20px;
}

.cover {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
              url('https://images.unsplash.com/photo-1520857014576-2c4f4c972b57');
  background-size: cover;
  background-position: center;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  margin: 10px 0;
}

h2 {
  font-size: 28px;
}

p {
  font-size: 16px;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #d4af37;
  color: white;
  text-decoration: none;
  border-radius: 25px;
}

.card {
  background: white;
  margin: 20px auto;
  padding: 30px;
  border-radius: 20px;
  max-width: 400px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<section class="cover">
  <h1>The Wedding Of</h1>
  <h2>Nama Pria & Nama Wanita</h2>
  <p>Kepada Yth: Tamu Undangan</p>
</section>

<section class="fade">
  <div class="card">
    <h2>💍 Save The Date</h2>
    <p>Sabtu, 10 Mei 2026</p>
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>📍 Lokasi</h2>
    <p>Gedung Serbaguna</p>
    <a class="btn" href="https://maps.google.com" target="_blank">Lihat Maps</a>
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>💌 Ucapan & Doa</h2>
    <p>Semoga menjadi keluarga sakinah mawaddah warahmah</p>
  </div>
</section>

<script>
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f7f3ef;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
}

section {
  padding: 40px 20px;
}

.cover {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
  url('https://images.unsplash.com/photo-1519741497674-611481863552');
  background-size: cover;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.btn {
  background: #8b6f47;
  color: white;
  padding: 12px 20px;
  border-radius: 25px;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px 0;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.gallery img {
  width: 100%;
  margin: 10px 0;
  border-radius: 10px;
}

.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

.opening {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#000;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.countdown {
  font-weight: bold;
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" id="opening">
  <h2>Undangan Pernikahan</h2>
  <p id="guest"></p>
  <button class="btn" onclick="openInvite()">Buka Undangan</button>
</div>

<!-- MUSIK -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="container">

<section class="cover">
  <h1>Nama Pria & Nama Wanita</h1>
</section>

<section class="fade">
  <div class="card">
    <h2>⏳ Countdown</h2>
    <div id="countdown" class="countdown"></div>
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>💍 Penganten</h2>
    <p><b>Nama Pria</b><br>Putra Bapak ...</p>
    <p><b>Nama Wanita</b><br>Putri Bapak ...</p>
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>📍 Lokasi</h2>
    <a class="btn" href="https://maps.google.com" target="_blank">Google Maps</a>
  </div>
</section>

<section class="fade">
  <div class="card gallery">
    <h2>📸 Our Memories</h2>
    <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>💌 RSVP & Ucapan</h2>
    <input type="text" id="nama" placeholder="Nama">
    <textarea id="pesan" placeholder="Ucapan..."></textarea>
    <button class="btn" onclick="kirimUcapan()">Kirim</button>
    <div id="listUcapan"></div>
  </div>
</section>

<section class="fade">
  <div class="card">
    <h2>🎁 Wedding Gift</h2>
    <p>Bank BCA</p>
    <p>1234567890</p>
    <p>a.n. Nama</p>
  </div>
</section>

</div>

<script>
// buka undangan
function openInvite(){
  document.getElementById("opening").style.display="none";
  document.getElementById("music").play();
}

// nama tamu dari URL
const urlParams = new URLSearchParams(window.location.search);
const guest = urlParams.get('to');
if(guest){
  document.getElementById("guest").innerText = "Kepada Yth: " + guest;
}

// animasi scroll
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});

// countdown
const targetDate = new Date("May 10, 2026").getTime();
setInterval(() => {
  const now = new Date().getTime();
  const d = targetDate - now;
  const hari = Math.floor(d/(1000*60*60*24));
  document.getElementById("countdown").innerText = hari + " hari lagi";
},1000);

// ucapan (local)
function kirimUcapan(){
  const nama = document.getElementById("nama").value;
  const pesan = document.getElementById("pesan").value;
  const list = document.getElementById("listUcapan");

  list.innerHTML += "<p><b>"+nama+"</b><br>"+pesan+"</p>";
}
</script>

</body>
</html>
